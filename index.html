<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Monstera Screening Room</title>
  <style>
    :root {
      --bg: #04100b;
      --panel: rgba(7, 29, 19, 0.88);
      --panel-2: rgba(10, 46, 29, 0.72);
      --green: #4cff9a;
      --green-2: #18c96e;
      --green-3: #0c7f49;
      --text: #effff5;
      --muted: #9ac9ad;
      --shadow: 0 0 28px rgba(38, 255, 139, .22);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(33, 175, 96, .18), transparent 35%),
        radial-gradient(circle at 85% 88%, rgba(24, 201, 110, .12), transparent 38%),
        linear-gradient(145deg, #020906, var(--bg));
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 42vw;
      aspect-ratio: 1;
      opacity: .085;
      pointer-events: none;
      filter: blur(.2px);
      background:
        radial-gradient(ellipse at 50% 50%, transparent 0 20%, #76ffad 21% 23%, transparent 24%),
        conic-gradient(from 15deg,
          transparent 0 10deg, #76ffad 11deg 18deg, transparent 19deg 42deg,
          #76ffad 43deg 50deg, transparent 51deg 75deg,
          #76ffad 76deg 83deg, transparent 84deg 112deg,
          #76ffad 113deg 120deg, transparent 121deg 360deg);
      border-radius: 44% 56% 54% 46%;
      transform: rotate(-18deg);
    }

    body::before { top: -14vw; left: -12vw; }
    body::after { right: -12vw; bottom: -16vw; transform: rotate(168deg); }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 10px;
      padding: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(76, 255, 154, .28);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(16, 54, 35, .72), rgba(7, 24, 16, .78));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .leaf {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50% 45% 55% 48%;
      background: linear-gradient(145deg, var(--green), var(--green-3));
      box-shadow: 0 0 18px rgba(76,255,154,.35);
      transform: rotate(-18deg);
      font-size: 19px;
    }

    h1 {
      margin: 0;
      font-size: clamp(14px, 2.2vw, 24px);
      line-height: 1;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      color: var(--muted);
      font-size: clamp(10px, 1.4vw, 13px);
      white-space: nowrap;
    }

    .player-shell {
      position: relative;
      min-height: 0;
      padding: 8px;
      border-radius: 22px;
      border: 1px solid rgba(76,255,154,.34);
      background:
        linear-gradient(135deg, rgba(76,255,154,.08), transparent 30%),
        rgba(2, 10, 7, .92);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.025),
        0 0 34px rgba(26, 214, 116, .17);
      overflow: hidden;
    }

    .player-shell::before,
    .player-shell::after {
      content: "✦";
      position: absolute;
      z-index: 2;
      color: var(--green);
      opacity: .7;
      text-shadow: 0 0 12px var(--green);
    }

    .player-shell::before { top: 12px; left: 14px; }
    .player-shell::after { right: 14px; bottom: 10px; }

    .video-wrap {
      width: 100%;
      height: 100%;
      min-height: 180px;
      border-radius: 15px;
      overflow: hidden;
      background: #000;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .selector-shell {
      position: relative;
      z-index: 10;
    }

    .selector-button {
      width: 100%;
      min-height: 66px;
      border: 1px solid rgba(76,255,154,.3);
      border-radius: 18px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(15, 56, 36, .94), rgba(6, 27, 17, .96));
      box-shadow: 0 0 22px rgba(76,255,154,.14);
      cursor: pointer;
      font: inherit;
      text-align: left;
      backdrop-filter: blur(14px);
    }

    .selector-button:hover,
    .selector-button[aria-expanded="true"] {
      border-color: rgba(76,255,154,.72);
      box-shadow: 0 0 26px rgba(76,255,154,.2);
    }

    .selector-left {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .selector-icon {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(76,255,154,.13);
      border: 1px solid rgba(76,255,154,.28);
      box-shadow: inset 0 0 12px rgba(76,255,154,.06);
    }

    .selector-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .selector-copy small {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .selector-copy strong {
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chevron {
      flex: 0 0 auto;
      color: var(--green);
      font-size: 24px;
      line-height: 1;
      transition: transform .18s ease;
      text-shadow: 0 0 10px rgba(76,255,154,.35);
    }

    .selector-button[aria-expanded="true"] .chevron {
      transform: rotate(180deg);
    }

    .dropdown-menu {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(100% + 8px);
      max-height: min(42vh, 320px);
      overflow-y: auto;
      padding: 8px;
      border-radius: 18px;
      border: 1px solid rgba(76,255,154,.28);
      background: linear-gradient(180deg, rgba(8, 34, 22, .98), rgba(3, 17, 10, .99));
      box-shadow: 0 18px 50px rgba(0,0,0,.45), 0 0 24px rgba(76,255,154,.14);
      backdrop-filter: blur(18px);
      scrollbar-width: thin;
      scrollbar-color: var(--green-2) rgba(255,255,255,.05);
    }

    .dropdown-menu[hidden] {
      display: none;
    }

    .dropdown-menu::-webkit-scrollbar { width: 8px; }
    .dropdown-menu::-webkit-scrollbar-track {
      background: rgba(255,255,255,.05);
      border-radius: 999px;
    }
    .dropdown-menu::-webkit-scrollbar-thumb {
      background: linear-gradient(var(--green), var(--green-3));
      border-radius: 999px;
    }

    .video-option {
      appearance: none;
      width: 100%;
      border: 1px solid transparent;
      border-radius: 13px;
      padding: 11px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      background: transparent;
      cursor: pointer;
      text-align: left;
      font: inherit;
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }

    .video-option:hover {
      background: rgba(76,255,154,.08);
      border-color: rgba(76,255,154,.22);
      transform: translateX(2px);
    }

    .video-option.active {
      background: linear-gradient(180deg, rgba(31,123,75,.48), rgba(8,50,29,.58));
      border-color: rgba(76,255,154,.56);
      box-shadow: inset 0 0 16px rgba(76,255,154,.06);
    }

    .option-number {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--green);
      background: rgba(76,255,154,.08);
      border: 1px solid rgba(76,255,154,.16);
      font-size: 11px;
      font-weight: 700;
    }

    .option-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .option-copy strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .option-copy span {
      color: var(--muted);
      font-size: 10px;
    }

    @media (min-aspect-ratio: 16/10) and (min-width: 760px) {
      .app {
        grid-template-columns: minmax(0, 1fr) minmax(210px, 28%);
        grid-template-rows: auto minmax(0, 1fr);
      }
      .header { grid-column: 1 / -1; }
      .selector-shell {
        align-self: end;
      }
    }

    @media (max-height: 520px) {
      .app { padding: 8px; gap: 7px; }
      .header { padding: 7px 10px; border-radius: 14px; }
      .leaf { width: 28px; height: 28px; font-size: 16px; }
      .selector-button { min-height: 56px; padding: 8px 11px; }
      .dropdown-menu { max-height: 38vh; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">
        <div class="leaf" aria-hidden="true">🌿</div>
        <div>
          <h1>Monstera Screening Room</h1>
        </div>
      </div>
      <div class="status" id="status">Now playing: Loading title…</div>
    </header>

    <section class="player-shell" aria-label="Video player">
      <div class="video-wrap">
        <iframe
          id="player"
          src="https://www.youtube-nocookie.com/embed/x19HSLNEN2o?rel=0&modestbranding=1&playsinline=1"
          title="Monstera Screening Room video player"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <section class="selector-shell" aria-label="Choose a video">
      <button class="selector-button" id="selectorButton" type="button" aria-expanded="false" aria-controls="dropdownMenu">
        <span class="selector-left">
          <span class="selector-icon" aria-hidden="true">🍃</span>
          <span class="selector-copy">
            <small>Choose a video</small>
            <strong id="selectedTitle">Loading title…</strong>
          </span>
        </span>
        <span class="chevron" aria-hidden="true">⌄</span>
      </button>
      <div class="dropdown-menu" id="dropdownMenu" hidden></div>
    </section>
  </main>

  <script>
    const videos = [{"title": "Loading title…", "fallback": "YouTube Short", "id": "x19HSLNEN2o", "type": "short"}, {"title": "Loading title…", "fallback": "iCarly", "id": "55Jt9GoQPLY", "type": "video"}, {"title": "Loading title…", "fallback": "SantinoVS - TDMN", "id": "VrfWSjgLKAw", "type": "video"}, {"title": "Loading title…", "fallback": "SantinoVS - PAINT SUM (VISUALIZER)", "id": "-7IpdRuhAmA", "type": "video"}, {"title": "Loading title…", "fallback": "YouTube Video 5", "id": "miOnqxT7kUU", "type": "video"}, {"title": "Loading title…", "fallback": "@MidnightSantino x @quiseONMARS - Studio Vlog", "id": "epsK_YJc55w", "type": "video"}, {"title": "Loading title…", "fallback": "YouTube Video 7", "id": "N-LnaEp2YQQ", "type": "video"}];
    const player = document.getElementById("player");
    const selectorButton = document.getElementById("selectorButton");
    const dropdownMenu = document.getElementById("dropdownMenu");
    const selectedTitle = document.getElementById("selectedTitle");
    const status = document.getElementById("status");

    function loadVideo(index, autoplay = true) {
      const video = videos[index];
      const params = new URLSearchParams({
        rel: "0",
        modestbranding: "1",
        playsinline: "1",
        autoplay: autoplay ? "1" : "0"
      });
      player.src = `https://www.youtube-nocookie.com/embed/${video.id}?${params.toString()}`;
      status.textContent = `Now playing: ${video.title}`;

      selectedTitle.textContent = video.title;
      document.querySelectorAll(".video-option").forEach((button, i) => {
        button.classList.toggle("active", i === index);
        button.setAttribute("aria-current", i === index ? "true" : "false");
      });
      dropdownMenu.hidden = true;
      selectorButton.setAttribute("aria-expanded", "false");
    }

    function renderPlaylist() {
      dropdownMenu.innerHTML = "";
      videos.forEach((video, index) => {
        const button = document.createElement("button");
        button.className = "video-option" + (index === 0 ? " active" : "");
        button.type = "button";
        button.dataset.index = index;
        button.innerHTML = `
          <span class="option-number">${String(index + 1).padStart(2, "0")}</span>
          <span class="option-copy">
            <strong>${video.title}</strong>
            <span>${video.type === "short" ? "YouTube Short" : "YouTube video"}</span>
          </span>`;
        button.addEventListener("click", () => loadVideo(index, true));
        dropdownMenu.appendChild(button);
      });
    }

    selectorButton.addEventListener("click", () => {
      const isOpen = selectorButton.getAttribute("aria-expanded") === "true";
      selectorButton.setAttribute("aria-expanded", String(!isOpen));
      dropdownMenu.hidden = isOpen;
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".selector-shell")) {
        dropdownMenu.hidden = true;
        selectorButton.setAttribute("aria-expanded", "false");
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        dropdownMenu.hidden = true;
        selectorButton.setAttribute("aria-expanded", "false");
        selectorButton.focus();
      }
    });

    async function loadYouTubeTitles() {
      await Promise.all(videos.map(async (video, index) => {
        const watchUrl = `https://www.youtube.com/watch?v=${video.id}`;
        const endpoint = `https://www.youtube.com/oembed?url=${encodeURIComponent(watchUrl)}&format=json`;

        try {
          const response = await fetch(endpoint);
          if (!response.ok) throw new Error("Title request failed");
          const data = await response.json();
          video.title = data.title || video.fallback;
        } catch (error) {
          video.title = video.fallback;
        }

        const titleElement = document.querySelector(`.video-option[data-index="${index}"] strong`);
        if (titleElement) titleElement.textContent = video.title;

        if (index === 0) {
          status.textContent = `Now playing: ${video.title}`;
          selectedTitle.textContent = video.title;
        }
      }));
    }

    renderPlaylist();
    loadYouTubeTitles();
  </script>
</body>
</html>
