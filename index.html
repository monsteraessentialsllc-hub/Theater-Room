<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Monstera Screening Room</title>
  <style>
    :root {
      --bg: #04100b;
      --panel: rgba(7, 29, 19, 0.88);
      --panel-2: rgba(10, 46, 29, 0.72);
      --green: #4cff9a;
      --green-2: #18c96e;
      --green-3: #0c7f49;
      --text: #effff5;
      --muted: #9ac9ad;
      --shadow: 0 0 28px rgba(38, 255, 139, .22);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(33, 175, 96, .18), transparent 35%),
        radial-gradient(circle at 85% 88%, rgba(24, 201, 110, .12), transparent 38%),
        linear-gradient(145deg, #020906, var(--bg));
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 42vw;
      aspect-ratio: 1;
      opacity: .085;
      pointer-events: none;
      filter: blur(.2px);
      background:
        radial-gradient(ellipse at 50% 50%, transparent 0 20%, #76ffad 21% 23%, transparent 24%),
        conic-gradient(from 15deg,
          transparent 0 10deg, #76ffad 11deg 18deg, transparent 19deg 42deg,
          #76ffad 43deg 50deg, transparent 51deg 75deg,
          #76ffad 76deg 83deg, transparent 84deg 112deg,
          #76ffad 113deg 120deg, transparent 121deg 360deg);
      border-radius: 44% 56% 54% 46%;
      transform: rotate(-18deg);
    }

    body::before { top: -14vw; left: -12vw; }
    body::after { right: -12vw; bottom: -16vw; transform: rotate(168deg); }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 10px;
      padding: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(76, 255, 154, .28);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(16, 54, 35, .72), rgba(7, 24, 16, .78));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .leaf {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50% 45% 55% 48%;
      background: linear-gradient(145deg, var(--green), var(--green-3));
      box-shadow: 0 0 18px rgba(76,255,154,.35);
      transform: rotate(-18deg);
      font-size: 19px;
    }

    h1 {
      margin: 0;
      font-size: clamp(14px, 2.2vw, 24px);
      line-height: 1;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      color: var(--muted);
      font-size: clamp(10px, 1.4vw, 13px);
      white-space: nowrap;
    }

    .player-shell {
      position: relative;
      min-height: 0;
      padding: 8px;
      border-radius: 22px;
      border: 1px solid rgba(76,255,154,.34);
      background:
        linear-gradient(135deg, rgba(76,255,154,.08), transparent 30%),
        rgba(2, 10, 7, .92);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.025),
        0 0 34px rgba(26, 214, 116, .17);
      overflow: hidden;
    }

    .player-shell::before,
    .player-shell::after {
      content: "✦";
      position: absolute;
      z-index: 2;
      color: var(--green);
      opacity: .7;
      text-shadow: 0 0 12px var(--green);
    }

    .player-shell::before { top: 12px; left: 14px; }
    .player-shell::after { right: 14px; bottom: 10px; }

    .video-wrap {
      width: 100%;
      height: 100%;
      min-height: 180px;
      border-radius: 15px;
      overflow: hidden;
      background: #000;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .playlist {
      min-height: 116px;
      max-height: 26vh;
      overflow-y: auto;
      padding: 8px;
      display: grid;
      gap: 8px;
      border-radius: 18px;
      border: 1px solid rgba(76,255,154,.22);
      background: linear-gradient(180deg, rgba(11, 38, 25, .9), rgba(5, 20, 13, .9));
      backdrop-filter: blur(14px);
      scrollbar-width: thin;
      scrollbar-color: var(--green-2) rgba(255,255,255,.06);
    }

    .playlist::-webkit-scrollbar { width: 8px; }
    .playlist::-webkit-scrollbar-track {
      background: rgba(255,255,255,.05);
      border-radius: 999px;
    }
    .playlist::-webkit-scrollbar-thumb {
      background: linear-gradient(var(--green), var(--green-3));
      border-radius: 999px;
    }

    .video-btn {
      appearance: none;
      width: 100%;
      border: 1px solid rgba(76,255,154,.2);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 11px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(16, 64, 40, .7), rgba(8, 34, 22, .76));
      cursor: pointer;
      text-align: left;
      font: inherit;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .video-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(76,255,154,.65);
      box-shadow: 0 0 16px rgba(76,255,154,.16);
    }

    .video-btn.active {
      border-color: var(--green);
      background: linear-gradient(180deg, rgba(31, 123, 75, .8), rgba(8, 50, 29, .88));
      box-shadow: 0 0 18px rgba(76,255,154,.22), inset 0 0 18px rgba(76,255,154,.07);
    }

    .icon {
      flex: 0 0 auto;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(76,255,154,.12);
      border: 1px solid rgba(76,255,154,.25);
    }

    .label {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .label strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
    }

    .label span {
      color: var(--muted);
      font-size: 11px;
    }

    @media (min-aspect-ratio: 16/10) and (min-width: 760px) {
      .app {
        grid-template-columns: minmax(0, 1fr) minmax(210px, 28%);
        grid-template-rows: auto minmax(0, 1fr);
      }
      .header { grid-column: 1 / -1; }
      .playlist {
        max-height: none;
        height: 100%;
        min-height: 0;
      }
    }

    @media (max-height: 520px) {
      .app { padding: 8px; gap: 7px; }
      .header { padding: 7px 10px; border-radius: 14px; }
      .leaf { width: 28px; height: 28px; font-size: 16px; }
      .playlist { min-height: 88px; max-height: 25vh; }
      .video-btn { padding: 9px 11px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">
        <div class="leaf" aria-hidden="true">🌿</div>
        <div>
          <h1>Monstera Screening Room</h1>
        </div>
      </div>
      <div class="status" id="status">Now playing: Loading title…</div>
    </header>

    <section class="player-shell" aria-label="Video player">
      <div class="video-wrap">
        <iframe
          id="player"
          src="https://www.youtube-nocookie.com/embed/x19HSLNEN2o?rel=0&modestbranding=1&playsinline=1"
          title="Monstera Screening Room video player"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <nav class="playlist" id="playlist" aria-label="Video playlist"></nav>
  </main>

  <script>
    const videos = [{"title": "Loading title…", "fallback": "YouTube Short", "id": "x19HSLNEN2o", "type": "short"}, {"title": "Loading title…", "fallback": "iCarly", "id": "55Jt9GoQPLY", "type": "video"}, {"title": "Loading title…", "fallback": "SantinoVS - TDMN", "id": "VrfWSjgLKAw", "type": "video"}, {"title": "Loading title…", "fallback": "SantinoVS - PAINT SUM (VISUALIZER)", "id": "-7IpdRuhAmA", "type": "video"}, {"title": "Loading title…", "fallback": "YouTube Video 5", "id": "miOnqxT7kUU", "type": "video"}, {"title": "Loading title…", "fallback": "@MidnightSantino x @quiseONMARS - Studio Vlog", "id": "epsK_YJc55w", "type": "video"}, {"title": "Loading title…", "fallback": "YouTube Video 7", "id": "N-LnaEp2YQQ", "type": "video"}];
    const player = document.getElementById("player");
    const playlist = document.getElementById("playlist");
    const status = document.getElementById("status");

    function loadVideo(index, autoplay = true) {
      const video = videos[index];
      const params = new URLSearchParams({
        rel: "0",
        modestbranding: "1",
        playsinline: "1",
        autoplay: autoplay ? "1" : "0"
      });
      player.src = `https://www.youtube-nocookie.com/embed/${video.id}?${params.toString()}`;
      status.textContent = `Now playing: ${video.title}`;

      document.querySelectorAll(".video-btn").forEach((button, i) => {
        button.classList.toggle("active", i === index);
        button.setAttribute("aria-current", i === index ? "true" : "false");
      });
    }

    function renderPlaylist() {
      playlist.innerHTML = "";
      videos.forEach((video, index) => {
        const button = document.createElement("button");
        button.className = "video-btn" + (index === 0 ? " active" : "");
        button.type = "button";
        button.dataset.index = index;
        button.innerHTML = `
          <span class="icon" aria-hidden="true">🍃</span>
          <span class="label">
            <strong>${video.title}</strong>
            <span>${video.type === "short" ? "YouTube Short" : "YouTube video"}</span>
          </span>`;
        button.addEventListener("click", () => loadVideo(index, true));
        playlist.appendChild(button);
      });
    }

    async function loadYouTubeTitles() {
      await Promise.all(videos.map(async (video, index) => {
        const watchUrl = `https://www.youtube.com/watch?v=${video.id}`;
        const endpoint = `https://www.youtube.com/oembed?url=${encodeURIComponent(watchUrl)}&format=json`;

        try {
          const response = await fetch(endpoint);
          if (!response.ok) throw new Error("Title request failed");
          const data = await response.json();
          video.title = data.title || video.fallback;
        } catch (error) {
          video.title = video.fallback;
        }

        const titleElement = document.querySelector(`.video-btn[data-index="${index}"] strong`);
        if (titleElement) titleElement.textContent = video.title;

        if (index === 0) {
          status.textContent = `Now playing: ${video.title}`;
        }
      }));
    }

    renderPlaylist();
    loadYouTubeTitles();
  </script>
</body>
</html>
